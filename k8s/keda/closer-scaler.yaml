apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: closer-agent-scaler
  namespace: omnisales
spec:
  scaleTargetRef:
    name: closer-agent
  minReplicaCount: 2
  maxReplicaCount: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-service.omnisales.svc.cluster.local:9092
        topic: pipeline.deals
        consumerGroup: closer-agent-group
        lagThreshold: "10"
