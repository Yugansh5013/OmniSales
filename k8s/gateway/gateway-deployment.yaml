apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: omnisales
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: omnisales-api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: omnisales-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: omnisales
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
